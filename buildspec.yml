version: 0.2

phases:

  install:
    commands:
      - echo Installing Terraform
      - curl -LO https://releases.hashicorp.com/terraform/1.7.5/terraform_1.7.5_linux_amd64.zip
      - unzip terraform_1.7.5_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - pip install checkov

  pre_build:
    commands:
      - terraform init

  build:
    commands:
      - terraform validate
      - echo Running Security Scan
      - checkov -d . --skip-check CKV_AWS_24,CKV_AWS_130,CKV_AWS_382,CKV_AWS_23
      - terraform plan

artifacts:
  files:
    - '**/*'
